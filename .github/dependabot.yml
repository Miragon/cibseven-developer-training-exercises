version: 2
updates:

  # Maven dependencies
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # CIB Seven 2.x is built against Spring Framework 6 / Spring Boot 3.x.
      # Spring Boot 4.x (Spring Framework 7) breaks CIB Seven at startup.
      # Re-enable once CIB Seven ships a Spring Boot 4-compatible release.
      - dependency-name: "org.springframework.boot:*"
        update-types:
          - "version-update:semver-major"
    groups:
      maven-dependencies:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
          - "major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    assignees:
      - "emaarco"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
          - "major"
