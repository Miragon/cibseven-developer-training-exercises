server:
  port: 8088

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cibseven-training?currentSchema=exercise7
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: exercise7

camunda:
  bpm:
    admin-user:
      id: admin
      password: admin
    database:
      type: postgres
      schema-update: true

cibseven:
  webclient:
    services:
      basePath: services/v1
    engineRest:
      url: http://localhost:8088
